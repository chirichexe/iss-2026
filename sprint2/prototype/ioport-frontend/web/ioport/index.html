<!doctype html>
<html lang="it">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>IOPort - Maritime CargoService</title>
    <link rel="stylesheet" href="./style.css">
  </head>
  <body>
    <main class="ioport-shell" aria-label="IOPort">
      <header class="page-header">
        <div>
          <p class="eyebrow">Maritime CargoService</p>
          <h1 id="ioport-title">IOPort</h1>
        </div>
        <div class="system-status" aria-label="Stato del sistema">
          <span id="service-indicator" class="status-pill working">Service working</span>
          <span id="ioport-state" class="status-pill free">IOPort libero</span>
        </div>
      </header>

      <section class="panel command-panel" aria-labelledby="command-title">
        <div class="panel-heading">
          <h2 id="command-title">Load Request</h2>
          <p>Invia una nuova richiesta al CargoService.</p>
        </div>
        <button id="load-button" class="load-button" type="button">
          <span class="button-icon" aria-hidden="true">LOAD</span>
          <span>Richiedi carico</span>
        </button>
      </section>

      <section class="panel display-panel" aria-labelledby="display-title">
        <div class="panel-heading display-heading">
          <div>
            <h2 id="display-title">Display IOPort</h2>
          </div>
        </div>

        <div class="display-sections">
          <section class="message-section" aria-labelledby="messages-title">
            <div class="section-heading">
              <div>
                <h3 id="messages-title">Messaggi</h3>
              </div>
            </div>
            <div class="display" role="status" aria-live="polite">
              <strong id="display-message">Service working</strong>
              <p id="reservation-timer" class="reservation-timer" hidden aria-live="off"></p>
            </div>
          </section>

          <section class="hold-section" aria-labelledby="hold-title">
            <div class="section-heading">
              <div>
                <h3 id="hold-title">Stato Hold</h3>
              </div>
            </div>

            <div class="hold-grid" aria-label="Occupazione slot hold">
              <div class="slot free" data-slot="slot1"><span>slot1</span><strong>libero</strong></div>
              <div class="slot free" data-slot="slot2"><span>slot2</span><strong>libero</strong></div>
              <div class="slot free" data-slot="slot3"><span>slot3</span><strong>libero</strong></div>
              <div class="slot free" data-slot="slot4"><span>slot4</span><strong>libero</strong></div>
              <div class="slot marker" data-slot="slot5"><span>slot5</span><strong>marker</strong></div>
            </div>
          </section>
        </div>
      </section>
    </main>

    <script src="./app.js"></script>
  </body>
</html>
