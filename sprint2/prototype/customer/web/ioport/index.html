<!doctype html>
<html lang="it">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>IOPort - Maritime CargoService</title>
    <link rel="stylesheet" href="./style.css">
  </head>
  <body>
    <main class="ioport-shell" aria-label="IOPort">
      <header class="page-header">
        <p class="eyebrow">Maritime CargoService</p>
        <h1 id="ioport-title">IOPort</h1>
      </header>

      <section class="panel status-panel" aria-labelledby="ioport-title">
        <div class="title-row">
          <h2>Comando</h2>
          <span id="service-indicator" class="status-pill working">Service working</span>
        </div>

        <div class="display" role="status" aria-live="polite">
          <span class="display-label">Display</span>
          <strong id="display-message">Sistema disponibile. Premi LOAD per richiedere il carico.</strong>
        </div>

        <button id="load-button" class="load-button" type="button">
          <span class="button-icon" aria-hidden="true">LOAD</span>
          <span>Richiedi carico</span>
        </button>
      </section>

      <section class="panel hold-panel" aria-labelledby="hold-title">
        <div class="title-row compact">
          <div>
            <p class="eyebrow">Hold</p>
            <h2 id="hold-title">Stato slot</h2>
          </div>
          <span id="ioport-state" class="status-pill free">IOPort libero</span>
        </div>

        <div class="hold-grid" aria-label="Occupazione slot hold">
          <div class="slot free" data-slot="slot1">
            <span>slot1</span>
            <strong>libero</strong>
          </div>
          <div class="slot free" data-slot="slot2">
            <span>slot2</span>
            <strong>libero</strong>
          </div>
          <div class="slot free" data-slot="slot3">
            <span>slot3</span>
            <strong>libero</strong>
          </div>
          <div class="slot free" data-slot="slot4">
            <span>slot4</span>
            <strong>libero</strong>
          </div>
          <div class="slot marker" data-slot="slot5">
            <span>slot5</span>
            <strong>marker</strong>
          </div>
        </div>
      </section>
    </main>

    <script src="./app.js"></script>
  </body>
</html>
